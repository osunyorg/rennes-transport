title: >-
  Alerte rouge canicule : soyez vigilants
level: warning
content: >-
  <p> Météo France a placé l'Ille-et-Vilaine en alerte rouge canicule ce lundi 22 juin 2026, et les prochains jours s'annoncent caniculaires. La Ville de Rennes s'adapte toute la semaine : ilots de fraicheurs, points d'eau, aménagement des horaires (école, déchèterie), protection des plus vulnérables...</p>
