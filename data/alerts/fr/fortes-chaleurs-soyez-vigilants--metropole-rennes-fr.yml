  Canicule et orages : vigilance ce weekend
level: warning
content: >-
  <p>L'Ille-et-Vilaine passe de la vigilance rouge Canicule à la vigilance orange. Météo-France a aussi placé le département en vigilance jaune Orages à partir de la nuit prochaine, de minuit à 3h et de 6h à 18h samedi 27 juin.     </p>
