  Canicule : la vigilance rouge maintenue jusqu'à 22h
level: warning
content: >-
  <p>L'Ille-et-Vilaine reste en vigilance rouge canicule jusqu'à 22h ce vendredi 26 juin. En conséquence, les manifestations ou évènements prévus sur l'espace public et dans les parcs et jardins  ce jour sont annulés ou reportés (selon le choix des organisateurs).</p>
