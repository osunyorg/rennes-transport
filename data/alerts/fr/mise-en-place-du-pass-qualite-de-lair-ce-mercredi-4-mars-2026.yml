title: >-
  Mise en place du pass qualité de l'air ce mercredi 4 mars 2026
level: info
content: >-
  <p>L’indice de la qualité de l’air enregistré par Air Breizh dans le département d’Ille-et-Vilaine indique un niveau élevé de particules fines. Le STAR met en place le Pass Qualité de l’Air soit 1,70 € le titre qui permet de circuler sur l’ensemble du réseau bus + métro toute la journée du mercredi 4 mars 2026.</p>
---
