title: >-
  Maintien du pass qualité de l'air le 23 mars
level: info
content: >-
  <p>L’indice de la qualité de l’air enregistré par Air Breizh dans le département d’Ille-et-Vilaine indique un niveau élevé de particules fines. Le STAR maintien le Pass Qualité de l’Air soit 1,70 € le titre qui permet de circuler sur l’ensemble du réseau bus + métro toute la journée ce lundi 23 mars.</p>
